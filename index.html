function renderLogin() {
    var opts='<option value="">-- Sélectionnez votre nom --</option>'; 
    ST.personnels.slice().filter(p=>!p.inactive).sort((a,b)=>a.nom.localeCompare(b.nom)).forEach(p=>{ opts+='<option value="'+p.id+'">'+p.nom+'</option>'; });

    var app = document.getElementById("app");
    app.innerHTML = `
    <div style="display:flex; flex-direction:column; height:100dvh; align-items:center; justify-content:center; background:var(--bg3); padding:20px;">
        <div style="margin-bottom:30px; display:flex; flex-direction:column; align-items:center;">
            <div style="width:60px; height:56px; margin-bottom:10px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            </div>
            <h1 style="font-size:24px; font-weight:800; color:var(--tx1);">Planning Usine</h1>
        </div>

        <div style="background:var(--bg1); padding:32px; border-radius:12px; border:1px solid var(--bd1); box-shadow:0 10px 25px rgba(0,0,0,0.05); width:100%; max-width:400px; text-align:center;">
            
            <div id="userLoginBlock">
                <label style="display:block; text-align:left; margin-bottom:8px; font-weight:700; font-size:13px; color:var(--tx2);">Votre profil :</label>
                <select id="loginPid" style="width:100%; padding:12px 14px; border-radius:8px; border:1px solid var(--bd1); background:var(--bg2); margin-bottom:16px; font-size:14px; outline:none;">
                    ${opts}
                </select>
                
                <div id="pwdBlock" style="display:none; text-align:left;">
                    <label id="pwdLabel" style="display:block; margin-bottom:8px; font-weight:700; font-size:13px; color:var(--tx2);">Mot de passe :</label>
                    <input type="password" id="loginPwd" style="width:100%; padding:12px 14px; border-radius:8px; border:1px solid var(--bd1); background:var(--bg1); margin-bottom:24px; font-size:14px; outline:none;">
                    <button id="loginBtn" class="btn p" style="width:100%; padding:14px; font-size:15px;">Se connecter</button>
                </div>
            </div>

            <div id="adminLoginBlock" style="display:none; text-align:left;">
                <label style="display:block; margin-bottom:8px; font-weight:700; font-size:13px; color:var(--tx2);">Code Administrateur :</label>
                <input type="password" id="adminPwd" style="width:100%; padding:12px 14px; border-radius:8px; border:1px solid var(--bd1); background:var(--bg1); margin-bottom:24px; font-size:14px; outline:none;">
                <button id="adminLoginBtn" class="btn p" style="width:100%; padding:14px; font-size:15px; background:#1e40af; border-color:#1e40af;">Connexion Admin</button>
            </div>

            <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--bd1);">
                <a href="#" id="toggleAdmin" style="color:var(--tx3); font-size:12px; text-decoration:none; font-weight:600;">Accès Administrateur</a>
            </div>
        </div>
    </div>
    `;

    document.getElementById('loginPid').addEventListener('change', function(e) {
        var pid = e.target.value;
        var pwdBlock = document.getElementById('pwdBlock');
        var loginBtn = document.getElementById('loginBtn');
        var pwdLabel = document.getElementById('pwdLabel');
        var loginPwd = document.getElementById('loginPwd');
        loginPwd.value = "";
        
        if(!pid) {
            pwdBlock.style.display = 'none';
            return;
        }
        var p = ST.personnels.find(x => String(x.id) === String(pid));
        pwdBlock.style.display = 'block';
        loginPwd.focus();
        
        if(p.pwd) {
            pwdLabel.textContent = "Mot de passe :";
            loginBtn.textContent = "Se connecter";
            loginBtn.dataset.mode = "login";
        } else {
            pwdLabel.textContent = "Créez votre mot de passe (1ère connexion) :";
            loginBtn.textContent = "Créer mon compte";
            loginBtn.dataset.mode = "create";
        }
    });

    document.getElementById('loginBtn').addEventListener('click', function() {
        var pid = document.getElementById('loginPid').value;
        var pwd = document.getElementById('loginPwd').value.trim();
        if(!pid || !pwd) { showToast("Veuillez remplir tous les champs", true); return; }
        
        var p = ST.personnels.find(x => String(x.id) === String(pid));
        if(this.dataset.mode === "create") {
            p.pwd = pwd;
            saveConfig();
            localStorage.setItem('artt-user', pid);
            ST.currentUser = pid;
            ST.calPid = pid;
            renderApp();
            showToast("Compte créé avec succès !");
            setTimeout(scrollTd, 100);
        } else {
            if(p.pwd === pwd) {
                localStorage.setItem('artt-user', pid);
                ST.currentUser = pid;
                ST.calPid = pid;
                renderApp();
                showToast("Connexion réussie !");
                setTimeout(scrollTd, 100);
            } else {
                showToast("Mot de passe incorrect", true);
            }
        }
    });

    document.getElementById('loginPwd').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('toggleAdmin').addEventListener('click', function(e) {
        e.preventDefault();
        var uBlock = document.getElementById('userLoginBlock');
        var aBlock = document.getElementById('adminLoginBlock');
        if(uBlock.style.display === 'none') {
            uBlock.style.display = 'block';
            aBlock.style.display = 'none';
            this.textContent = "Accès Administrateur";
        } else {
            uBlock.style.display = 'none';
            aBlock.style.display = 'block';
            this.textContent = "Retour Espace Employés";
            document.getElementById('adminPwd').focus();
        }
    });

    document.getElementById('adminLoginBtn').addEventListener('click', function() {
        var pwd = document.getElementById('adminPwd').value.trim();
        if(pwd === "2214") {
            localStorage.setItem('artt-user', 'admin');
            ST.isAdmin = true;
            ST.currentUser = 'admin';
            ST.tab = 'personnel'; 
            renderApp();
            showToast("Mode Administrateur activé");
        } else {
            showToast("Code Admin incorrect", true);
        }
    });

    document.getElementById('adminPwd').addEventListener('input', function(e) {
        if(e.target.value.trim() === "2214") {
            document.getElementById('adminLoginBtn').click();
        }
    });
    
    document.getElementById('adminPwd').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') document.getElementById('adminLoginBtn').click();
    });
}

// === RENDER ===
function renderApp(){
  if (ST.loaded && !ST.isAdmin && !ST.currentUser) {
      var saved = localStorage.getItem('artt-user');
      if (saved === 'admin') {
          ST.isAdmin = true;
          ST.currentUser = 'admin';
      } else if (saved && ST.personnels.find(p => String(p.id) === saved)) {
          ST.currentUser = saved;
          if(!ST.calPid) ST.calPid = saved;
      } else {
          renderLogin();
          return;
      }
  }
  
  var activeElId = document.activeElement ? document.activeElement.id : null;
  var selStart = document.activeElement ? document.activeElement.selectionStart : null;
  
  var gcElemBefore = document.querySelector(".gc");
  if(gcElemBefore && ST.tab === "planning") { ST.scrollPlanX = gcElemBefore.scrollLeft; ST.scrollPlanY = gcElemBefore.scrollTop; }
  
  var calElemBefore = document.querySelector(".cal-wrapper");
  if(calElemBefore && ST.tab === "calendrier") { ST.scrollCalX = calElemBefore.scrollLeft; ST.scrollCalY = calElemBefore.scrollTop; }

  var app=document.getElementById("app"); app.innerHTML="";
  
  var userNameDisplay = "";
  if (ST.currentUser) {
      if (ST.currentUser === 'admin') {
          userNameDisplay = "👑 Administrateur";
      } else {
          var u = ST.personnels.find(x => String(x.id) === String(ST.currentUser));
          if (u) userNameDisplay = "👤 " + u.nom;
      }
  }

  var tb=`<div class="topbar">
    <div class="logo-container">
      <div style="display:flex;justify-content:center;align-items:center;height:38px;margin-bottom:4px;"><img src="Alpro_FullLogo_Raster_RGB.jpg" alt="Logo" style="height:100%;width:auto;object-fit:contain;border-radius:4px;"></div>
      <span style="font-size:12px;font-weight:800;color:var(--primary);letter-spacing:-0.2px;">Usine de Villecomtal</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
      <div class="sync-indicator"><div class="sync-dot ${ST.loaded?"ok":"spin"}" id="sD"></div><span id="sL">${ST.loaded?"Synchronisé":"Chargement..."}</span></div>
      ${userNameDisplay ? `<span style="font-size:11px; font-weight:700; color:var(--primary); background:var(--bg2); padding:2px 8px; border-radius:10px;">${userNameDisplay}</span>` : ''}
    </div>
    <div class="year-nav"><button id="pY">&lt;</button><span>Planning Usine ${ST.year}</span><button id="nY">&gt;</button></div>
    <div class="nav-tabs">
      <button class="nav-tab${ST.tab==='planning'?' active':''}" data-tab="planning">Planning global</button>
      <button class="nav-tab${ST.tab==='calendrier'?' active':''}" data-tab="calendrier">Calendrier personnel</button>
      <button class="nav-tab" id="themeToggle" title="Mode Sombre / Clair">${document.documentElement.getAttribute('data-theme')==='dark'?'☀️ Clair':'🌙 Sombre'}</button>
      ${ST.isAdmin?`<button class="nav-tab${ST.tab==='personnel'?' active':''}" data-tab="personnel">Personnel</button><button class="nav-tab${ST.tab==='parametres'?' active':''}" data-tab="parametres">Paramètres</button><button class="nav-tab" id="lockBtn" style="padding:10px;" title="Verrouiller l'accès">🔒</button>`:`<input type="password" id="adminCode" placeholder="Code Admin..." maxlength="4" style="width:110px;padding:10px 12px;border:1px solid var(--bd1);border-radius:8px;font-size:14px;background:var(--bg2);">`}
      <button class="nav-tab" id="logoutBtn" style="color:#E24B4A;border-color:#fca5a5;background:#fef2f2;">Déconnexion</button>
    </div>
    <div class="bilan-btns">
      <button class="bilan-btn" id="bS0" style="background:var(--bg2);color:var(--tx1);">&#128337; Absent cette semaine</button>
      <button class="bilan-btn" id="bS_next" style="background:var(--bg2);color:var(--tx1);">&#128337; Absent la semaine prochaine</button>
      <button class="bilan-btn" id="bS1">&#128337; Bilan S-1</button>
      ${ST.isAdmin ? `
      <button class="bilan-btn" id="bM1">&#128337; Bilan M-1</button>
      <button class="bilan-btn" id="bAn">&#9998; Bilan global ${ST.year}</button>
      ` : ''}
      <button class="bilan-btn" id="bHelp" style="background:#3B82F6;color:white;border-color:#3B82F6;">❓ Tuto</button>
    </div>
  </div>`;
  app.innerHTML=tb;
  
  if (ST.loaded) {
      var ct=document.createElement("div");ct.className="content";
      if(ST.tab==="planning") ct.appendChild(rPlanning());
      else if(ST.tab==="calendrier") ct.appendChild(rCalendrier());
      else if(ST.tab==="personnel") ct.appendChild(rPersonnel());
      else ct.appendChild(rParametres());
      app.appendChild(ct);
  } else {
      var loadDiv=document.createElement("div");loadDiv.className="content";
      loadDiv.innerHTML = '<div style="display:flex;height:100%;align-items:center;justify-content:center;color:var(--tx3);font-size:16px;">Chargement de la base de données...</div>';
      app.appendChild(loadDiv);
  }
  
  bindAppEvents();
  renderModals();

  ST.ignoreScroll = true; 
  requestAnimationFrame(function() {
      if (ST.tab === 'planning') {
          var newGc = document.querySelector(".gc");
          if (newGc) {
              newGc.scrollLeft = ST.scrollPlanX || 0;
              newGc.scrollTop = ST.scrollPlanY || 0;
              updateMonthHighlight(ST.scrollPlanX || 0);
          }
      } else if (ST.tab === 'calendrier') {
          var newCw = document.querySelector(".cal-wrapper");
          if (newCw) {
              newCw.scrollLeft = ST.scrollCalX || 0;
              newCw.scrollTop = ST.scrollCalY || 0;
          }
      }
      setTimeout(function(){ ST.ignoreScroll = false; }, 100);
  });

  if(activeElId) {
    var el = document.getElementById(activeElId);
    if(el) { el.focus(); if(selStart !== null && el.setSelectionRange) el.setSelectionRange(selStart, selStart); }
  }
}

function updateMonthHighlight(sl) {
    var activeM = 0; for(var m=11; m>=0; m--) { var el = document.getElementById("m-start-" + m); if(el && (el.offsetLeft - getNameColWidth()) <= sl + 150) { activeM = m; break; } }
    document.querySelectorAll(".month-btn").forEach(b => { if(parseInt(b.getAttribute("data-month")) === activeM) b.classList.add("active"); else b.classList.remove("active"); });
}

function renderModals() {
    var mc = document.getElementById("modal-container"); if(!mc) { mc = document.createElement("div"); mc.id = "modal-container"; document.body.appendChild(mc); } mc.innerHTML = "";
    if(ST.modal) mc.appendChild(rModal()); if(ST.eModal) mc.appendChild(rEModal()); if(ST.pModal) mc.appendChild(rPModal()); if(ST.svcModal) mc.appendChild(rSvcModal()); if(ST.grpModal) mc.appendChild(rGrpModal()); if(ST.bModal) mc.appendChild(rBilan()); if(ST.tutoModal) mc.appendChild(rTutoModal());
    bindModalEvents();
}

function getLegendBarHTML() {
  var html = '<div class="legend-bar"><div class="legend-pill-container"><div style="font-size:14px; font-weight:800; color:var(--tx2); margin-right:8px;">🖌️ Saisie rapide :</div><button class="legend-pill' + (ST.selectedCauseId === 'erase' ? ' active' : '') + '" style="background:#fce7f3;color:#db2777;' + (ST.selectedCauseId === 'erase' ? 'border-color:#db2777;' : '') + '" data-cause="erase"><span style="font-size:13px">🧽</span> Gomme</button>';
  ST.causes.forEach(c => { html += '<button class="legend-pill' + (ST.selectedCauseId === c.id ? ' active' : '') + '" style="background:'+c.color+'22;color:'+c.color+';' + (ST.selectedCauseId === c.id ? 'border-color:'+c.color+';' : '') + '" data-cause="' + c.id + '">' + c.label + ' (' + c.id + ')</button>'; });
  html += '</div><div class="legend-extras"><div class="leg-item"><div class="leg-swatch" style="background:#fde68a"></div>Férié</div><div class="leg-item"><div class="leg-swatch" style="background:#dbeafe"></div>Vacances</div><div class="leg-item"><div class="leg-swatch" style="background:#bbf7d0"></div>Auj.</div></div></div>'; return html;
}

function rPlanning() {
    var div = document.createElement("div");
    div.className = "planning";
    div.innerHTML = getLegendBarHTML();
    
    var pt = '<div class="period-toggles" style="margin-left:10px;">'
        + '<button class="period-btn'+(ST.selectedPeriod==='full'?' active':'')+'" data-period="full">Jour</button>'
        + '<button class="period-btn'+(ST.selectedPeriod==='am'?' active':'')+'" data-period="am">Matin</button>'
        + '<button class="period-btn'+(ST.selectedPeriod==='pm'?' active':'')+'" data-period="pm">Aprem</button>'
        + '</div>';

    var mn = document.createElement("div");
    mn.className = "month-nav";
    mn.innerHTML = '<div class="month-filters">'
        + '<select id="fSvc"><option value="">Tous les services</option>'+selOpts(ST.services,ST.fSvc)+'</select>'
        + '<select id="fGrp"><option value="">Tous les groupes</option>'+selOpts(ST.groupes,ST.fGrp)+'</select>'
        + '<input type="text" id="fSearch" class="search-input" style="margin-left:10px; width:200px;" placeholder="🔎 Rechercher un employé..." value="'+ST.fSearch+'">'
        + pt + '</div>'
        + '<div class="month-btns-wrap">' + MO.map((m,i)=>`<button class="month-btn" data-month="${i}">${m}</button>`).join('') + '</div>';
    
    div.appendChild(mn);
    var gc = document.createElement("div");
    gc.className = "gc";
    gc.appendChild(buildGrid());
    div.appendChild(gc);
    return div;
}

function buildGrid() {
    var y=ST.year, ps=filtP(), wgs=[], cw=null;
    for(var mo=0; mo<12; mo++){
        var nd=dim(y,mo);
        for(var d=1; d<=nd; d++){
            var wk=isoWk(y,mo,d);
            if(!cw || cw.wk!==wk){
                if(cw) wgs.push(cw);
                cw={wk:wk, cnt:0, mos:{}};
            }
            cw.cnt++;
            cw.mos[mo] = true;
        }
    }
    if(cw) wgs.push(cw);
    
    var grid = document.createElement("div"); grid.className = "grid";
    var hdr = document.createElement("div"); hdr.className = "ghdr";
    
    var wr = document.createElement("div"); wr.className = "ghdr-w";
    wr.innerHTML = '<div class="stub-w"><div style="font-weight:600;font-size:12px">'+ps.length+' employé(s)</div><div style="font-size:10px;color:var(--tx3);margin-top:2px">Année '+y+'</div></div>'
        + '<div class="wks-row">' + wgs.map(w => '<div class="wk-lbl" style="width:'+(w.cnt*34)+'px;min-width:'+(w.cnt*34)+'px;max-width:'+(w.cnt*34)+'px;"><div style="font-size:14px;font-weight:800;color:var(--tx1);line-height:1.2;text-transform:uppercase;">' + Object.keys(w.mos).map(m=>MS[parseInt(m)]).join(" / ") + '</div><span style="font-size:10px;font-weight:600;color:var(--tx3);">S.'+p2(w.wk)+'</span></div>').join('') + '</div>';
    hdr.appendChild(wr);

    var dr = document.createElement("div"); dr.className = "ghdr-d";
    var dh = document.createElement("div"); dh.className = "dhdr";
    dr.innerHTML = '<div class="stub-d"></div>';
    
    for(var mo=0; mo<12; mo++){
        var nd=dim(y,mo);
        for(var d=1; d<=nd; d++){
            var we=isWe(y,mo,d), fe=isFe(y,mo,d), va=isVa(y,mo,d), td=isTd(y,mo,d), mon=(dow(y,mo,d)===1);
            var cls = "dc" + (td?" td":fe?" fe":va?" va":we?" we":"") + (mon||d===1?" ms":"");
            dh.innerHTML += '<div class="'+cls+'" title="'+(fe?'Jour férié':va?'Vacances (Zone C)':'')+'" '+(d===1?'id="m-start-'+mo+'"':'')+'>'
                + '<div class="dc-n">'+d+'</div><div class="dc-d">'+DS[dow(y,mo,d)]+'</div></div>';
        }
    }
    dr.appendChild(dh);
    hdr.appendChild(dr);
    grid.appendChild(hdr);

    for(var pi=0; pi<ps.length; pi++){
        var p = ps[pi];
        var row = document.createElement("div"); row.className = "row";
        row.innerHTML = '<div class="nc"><div class="nc-info"><div class="nom" title="'+p.nom+'">'+p.nom+'</div><div class="svc">'+p.service+' <span class="grp">('+p.groupe+')</span></div></div><button class="btn-bp" data-bpp="'+p.id+'" title="Voir le bilan annuel">📊</button></div>';
        
        var dr2 = document.createElement("div"); dr2.className = "dr";
        for(var mo=0; mo<12; mo++){
            var nd=dim(y,mo);
            for(var d=1; d<=nd; d++){
                var we=isWe(y,mo,d), fe=isFe(y,mo,d), va=isVa(y,mo,d), td=isTd(y,mo,d), mon=(dow(y,mo,d)===1);
                var k = eKey(p.id,y,mo,d), ev = ST.events[k];
                var cls2 = "ec" + (td?" td":fe?" fe":va?" va":we?" we":"") + (mon||d===1?" ms":"");
                var ec = document.createElement("div");
                ec.className = cls2;
                if(ev) applyCellVisuals(ec, ev);
                else if(fe) ec.title = "Jour férié";
                else if(va) ec.title = "Vacances (Zone C)";
                
                ec.setAttribute("data-pid", p.id);
                ec.setAttribute("data-day", d);
                ec.setAttribute("data-month", mo);
                ec.setAttribute("data-key", k);
                dr2.appendChild(ec);
            }
        }
        row.appendChild(dr2);
        grid.appendChild(row);
    }
    return grid;
}

function rCalendrier() {
  var div = document.createElement("div"); div.className = "planning"; div.innerHTML = getLegendBarHTML();
  div.innerHTML += '<div class="month-nav"><div class="month-filters" style="width:100%; display:flex; gap:10px; align-items:center;"><span style="font-weight:bold; color:var(--primary);">Sélection :</span><select id="calSvc"><option value="">Tous les services</option>' + selOpts(ST.services, ST.calSvc) + '</select><select id="calPid" style="min-width:200px;"><option value="">-- Choisir un employé --</option>' + getCalPidOpts() + '</select><div class="period-toggles" style="margin-left:10px;"><button class="period-btn'+(ST.selectedPeriod==='full'?' active':'')+'" data-period="full">Jour</button><button class="period-btn'+(ST.selectedPeriod==='am'?' active':'')+'" data-period="am">Matin</button><button class="period-btn'+(ST.selectedPeriod==='pm'?' active':'')+'" data-period="pm">Aprem</button></div></div></div>';
  var gc = document.createElement("div"); gc.className = "cal-wrapper";
  if (!ST.calPid) { gc.innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:var(--tx3); font-size:16px;">Veuillez sélectionner un employé ci-dessus.</div>'; } 
  else {
     var p = ST.personnels.find(x => String(x.id) === String(ST.calPid));
     if(!p) { ST.calPid = ""; return rCalendrier(); }
     var calGrid = document.createElement("div"); calGrid.className = "cal-grid";
     for(var mo=0; mo<12; mo++){
        var col = document.createElement("div"); col.className = "cal-col"; col.innerHTML = `<div class="cal-month-name">${MO[mo]}</div>`;
        var nd = dim(ST.year, mo);
        for(var d=1; d<=31; d++){
           if(d <= nd) {
               var we=isWe(ST.year,mo,d),fe=isFe(ST.year,mo,d),va=isVa(ST.year,mo,d),td=isTd(ST.year,mo,d),dw=dow(ST.year,mo,d),row=document.createElement("div"); row.className = "cal-row";
               row.innerHTML = `<div class="cal-lbl${(dw===0||dw===6)?" we":""}${fe?" fe":""}${td?" td":""}"><span>${d}</span><span>${DS[dw]}</span></div>`;
               var k = eKey(p.id, ST.year, mo, d), ev = ST.events[k], ec = document.createElement("div"); ec.className = "ec cal-ec" + (td?" td":fe?" fe":va?" va":we?" we":"");
               if(ev) applyCellVisuals(ec, ev); else if(fe) ec.title="Jour férié"; else if(va) ec.title="Vacances (Zone C)";
               ec.setAttribute("data-pid", p.id); ec.setAttribute("data-day", d); ec.setAttribute("data-month", mo); ec.setAttribute("data-key", k); row.appendChild(ec); col.appendChild(row);
           } else { col.innerHTML += '<div class="cal-row empty"></div>'; }
        }
        calGrid.appendChild(col);
     }
     gc.appendChild(calGrid);
  }
  div.appendChild(gc); return div;
}

function rTutoModal() {
    var ov = document.createElement('div'); ov.className = 'ov'; ov.id = 'tutoOv';
    ov.innerHTML = `<div class="bm" style="max-width:1000px; width:95%;"><div class="bm-hdr"><h2>📖 Tutoriel d'utilisation</h2><button class="bm-x" id="clTuto">&#10005;</button></div><div class="bm-body" style="padding:32px; font-size:16px; line-height:1.7; color:var(--tx1); overflow-y:auto;"><h3 style="color:var(--primary); font-size:19px; margin-bottom:10px;">1️⃣ Poser une ou plusieurs absences (Saisie Rapide)</h3><p>Sélectionnez un motif en haut, puis choisissez <b>Jour</b>, <b>Matin</b> ou <b>Aprem</b>.</p><ul style="margin-left:20px; margin-top:8px; margin-bottom:8px;"><li>🖱️ <b>Pour un seul jour :</b> Cliquez simplement sur la case (clic gauche).</li><li>🖱️ <b style="color:var(--primary);">Saisie multiple :</b> Cliquez sur une date de début, <b>maintenez le clic enfoncé</b>, glissez la souris jusqu'à la date de fin, puis relâchez pour remplir plusieurs jours d'un coup !</li></ul><p style="color:#E24B4A; font-weight:600; margin-top:8px;">⚠️ Le clic gauche ne fonctionne QUE si un motif est sélectionné en haut.</p><h3 style="color:var(--primary); font-size:19px; margin-top:20px; margin-bottom:10px;">2️⃣ Les Demi-Journées (Matin / Après-midi)</h3><p>Vous pouvez très facilement poser une demi-journée, ou combiner deux motifs ! Utilisez les boutons <b>Matin</b> et <b>Aprem</b> de la barre supérieure.</p><h3 style="color:var(--primary); font-size:19px; margin-top:20px; margin-bottom:10px;">3️⃣ Effacer avec la Gomme</h3><p>Cliquez sur le bouton 🧽 Gomme. Cliquez ensuite (ou glissez) sur les cases à effacer. (La gomme efface toute la case, quoiqu'il arrive !)</p><h3 style="color:var(--primary); font-size:19px; margin-top:20px; margin-bottom:10px;">4️⃣ Clic Droit = Détails & Commentaires</h3><p>Faites un <b>Clic Droit</b> sur n'importe quelle case du planning pour ouvrir la fenêtre de détails.</p><h3 style="color:var(--primary); font-size:19px; margin-top:24px; margin-bottom:10px;">5️⃣ Vue "Calendrier Personnel"</h3><p>L'onglet <b>Calendrier personnel</b> permet de voir l'année d'un collaborateur. Sélectionnez son Service, puis son Nom. Vous pourrez saisir avec les mêmes outils !</p><div style="text-align:right; margin-top:24px;"><button class="btn p" id="btnGotIt" style="padding:12px 24px; font-size:16px;">J'ai compris !</button></div></div></div>`;
    return ov;
}

function rModal(){
  var m2=ST.modal, ov=document.createElement('div'); ov.className='ov'; ov.id='mOv';
  var p=ST.personnels.find(x=>String(x.id)===String(m2.pid)), ev=ST.events[m2.key], dw=dow(ST.year,m2.month,m2.day), wk=isoWk(ST.year,m2.month,m2.day);
  var fe=isFe(ST.year,m2.month,m2.day), va=isVa(ST.year,m2.month,m2.day), we=isWe(ST.year,m2.month,m2.day), fullC='', fullCm='';
  
  if(ev){
      if(ev.type==='full'){
          fullC=ev.causeId; 
          fullCm=ev.comment;
      }else if(ev.type==='half'){
          if(ev.am){fullC=ev.am.causeId; fullCm=ev.am.comment;}
          else if(ev.pm){fullC=ev.pm.causeId; fullCm=ev.pm.comment;}
      }
  }
  if(fullCm==="Import Excel")fullCm=""; 
  
  var badge=fe?' <span style="background:#fde68a;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px">Férié</span>':va?' <span style="background:#dbeafe;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px">Vacances (Zone C)</span>':we?' <span style="background:var(--bd1);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px">Week-end</span>':'';
  var o='<option value="">&mdash; Présent / Aucune &mdash;</option>'; 
  ST.causes.forEach(c=>o+='<option value="'+c.id+'"'+(fullC===c.id?' selected':'')+'>'+c.id+' — '+c.label+'</option>');
  
  ov.innerHTML=`<div class="modal"><h3>${p?p.nom:''}</h3><div style="font-size:13px;color:var(--tx2);margin-bottom:16px;display:flex;align-items:center;">${DL[dw]} ${m2.day} ${MO[m2.month]} ${ST.year} <span style="margin:0 8px">&mdash;</span> S${p2(wk)}${badge}</div><div class="mr"><label>Motif de l'absence (Journée entière)</label><select id="mC_full" style="margin-bottom:8px;">${o}</select></div><div class="mr"><label>Commentaire</label><input id="mCm_full" value="${fullCm}" placeholder="Saisir un commentaire..."/></div><div class="mbtns">${ev?'<button class="btn d" id="dEv">Vider la case</button>':''}<button class="btn" id="cMod">Annuler</button><button class="btn p" id="sMod">Enregistrer</button></div></div>`;
  return ov;
}

function rBilan(){
  var bm=ST.bModal, ov=document.createElement("div"); ov.className="ov"; ov.id="bmOv";
  var fs=bm.fs||"", fg=bm.fg||"", title="", badge="", evs=[], isCg=false;
  if(bm.type==="conge"){ isCg=true; title="Bilan global des congés "+ST.year; evs=evRange(ST.year,0,1,ST.year,11,31,fs,fg); }
  else if(bm.type==="semaine_courante"){ var cw=currWk(); title="Absents cette semaine"; badge=`Semaine en cours : S${p2(cw.wk)} — ${p2(cw.mon.getDate())} ${MS[cw.mon.getMonth()]} au ${p2(cw.fri.getDate())} ${MS[cw.fri.getMonth()]} ${cw.fri.getFullYear()}`; evs=evRange(cw.mon.getFullYear(),cw.mon.getMonth(),cw.mon.getDate(),cw.fri.getFullYear(),cw.fri.getMonth(),cw.fri.getDate(),fs,fg); }
  else if(bm.type==="semaine"){ var pw=prevWk(); title="Historique S-1"; badge=`Semaine analysée : S${p2(pw.wk)} — ${p2(pw.mon.getDate())} ${MS[pw.mon.getMonth()]} au ${p2(pw.fri.getDate())} ${MS[pw.fri.getMonth()]} ${pw.fri.getFullYear()}`; evs=evRange(pw.mon.getFullYear(),pw.mon.getMonth(),pw.mon.getDate(),pw.fri.getFullYear(),pw.fri.getMonth(),pw.fri.getDate(),fs,fg); }
  else if(bm.type==="semaine_prochaine"){ var nw=nextWk(); title="Absents la semaine prochaine"; badge=`Semaine prochaine : S${p2(nw.wk)} — ${p2(nw.mon.getDate())} ${MS[nw.mon.getMonth()]} au ${p2(nw.fri.getDate())} ${MS[nw.fri.getMonth()]} ${nw.fri.getFullYear()}`; evs=evRange(nw.mon.getFullYear(),nw.mon.getMonth(),nw.mon.getDate(),nw.fri.getFullYear(),nw.fri.getMonth(),nw.fri.getDate(),fs,fg); }
  else if(bm.type==="mois"){ var pm=prevMo(); title="Historique M-1"; badge=`Mois analysé : ${MO[pm.month]} ${pm.year}`; evs=evRange(pm.year,pm.month,1,pm.year,pm.month,dim(pm.year,pm.month),fs,fg); }
  else if(bm.type==="person"){ var prs=ST.personnels.find(x=>String(x.id)===String(bm.pid)); title="Bilan individuel de l'année — "+prs.nom; badge=`${prs.service} | ${prs.groupe}`; evs=evRange(ST.year,0,1,ST.year,11,31,"","").filter(e=>String(e.person.id)===String(prs.id)); }
  
  var tot=evs.length, uniq=new Set(evs.map(e=>e.person.id)).size, cc={}; evs.forEach(e => cc[e.causeId] = (cc[e.causeId]||0) + (e.period==='full'?1:0.5));
  var stats=`<div class="bm-sc"><div class="bm-sn">${tot}</div><div class="bm-sl">Lignes (Jours/Demi)</div></div>${bm.type!=='person'?`<div class="bm-sc"><div class="bm-sn">${uniq}</div><div class="bm-sl">Personnes</div></div>`:''}`;
  ST.causes.forEach(c => { if(cc[c.id]) stats+=`<div class="bm-sc"><div class="bm-sn" style="color:${c.color}">${cc[c.id]}</div><div class="bm-sl">${c.label}</div></div>`; });
  
  var body="", csvData="", hds='<th>Employé</th><th>Service</th>'; ST.causes.forEach(c=>hds+=`<th style="color:${c.color}">${c.label}</th>`); hds+=`<th>Total ${ST.year}</th>`;
  
  if(isCg){
    var byP={}, psFiltered=filtP(); psFiltered.forEach(p=>{ byP[p.id]={person:p,counts:{}}; ST.causes.forEach(c=>byP[p.id].counts[c.id]=0); });
    evs.forEach(e=>{ if(byP[e.person.id]) byP[e.person.id].counts[e.causeId] += (e.period==='full'?1:0.5); });
    var pers=Object.values(byP), totC={}, grand=0; ST.causes.forEach(c=>totC[c.id]=0);
    pers.forEach(pg=>{ ST.causes.forEach(c=>totC[c.id]+=pg.counts[c.id]); }); ST.causes.forEach(c=>grand+=totC[c.id]);
    
    csvData += ["Employé", "Service", "Groupe", ...ST.causes.map(c=>c.label), `Total ${ST.year}`].join(";") + "\n";
    var rows = pers.map(pg => {
        var pt=0; ST.causes.forEach(c=>pt+=pg.counts[c.id]);
        csvData += [pg.person.nom, pg.person.service, pg.person.groupe, ...ST.causes.map(c=>pg.counts[c.id]||0), pt].join(";") + "\n";
        return `<tr><td class="bc-e">${pg.person.nom}</td><td><span class="bc-s">${pg.person.service}</span> <span class="bc-g">(${pg.person.groupe})</span></td>` + ST.causes.map(c=>pg.counts[c.id]>0?`<td class="bc-c" style="color:${c.color}">${pg.counts[c.id]}</td>`:'<td class="bc-d">—</td>').join('') + `<td class="bc-t">${pt>0?pt:"—"}</td></tr>`;
    }).join('');
    
    csvData += ["TOTAL", "", "", ...ST.causes.map(c=>totC[c.id]||0), grand].join(";") + "\n";
    var totRow = `<tr class="bc-tr"><td colspan="2">Total</td>` + ST.causes.map(c=>`<td style="color:${c.color}">${totC[c.id]||"—"}</td>`).join('') + `<td>${grand}</td></tr>`;
    body = `<div class="bc-wrap"><table class="bc-tbl"><thead><tr>${hds}</tr></thead><tbody>${rows}${totRow}</tbody></table></div>`;
  }else{
    var byP2={}, searchLower = ST.fSearch.toLowerCase();
    evs.forEach(e=>{ if(ST.fSearch && e.person.nom.toLowerCase().indexOf(searchLower)===-1) return; if(!byP2[e.person.id]) byP2[e.person.id]={person:e.person,entries:[]}; byP2[e.person.id].entries.push(e); });
    var pids=Object.keys(byP2).sort((a,b)=>byP2[a].person.nom.localeCompare(byP2[b].person.nom)); pids.forEach(id=>byP2[id].entries.sort((a,b)=>a.date-b.date));
    csvData += "Date;Employé;Service;Groupe;Type;Période;Commentaire\n";
    if(pids.length===0) { body='<div class="bm-empty">Aucune absence enregistrée sur cette période.</div>'; }
    else {
      var tbody = pids.map(id => {
          var g=byP2[id], htm=bm.type!=='person'?`<tr class="bh-pr"><td colspan="3">${g.person.nom}<span class="bh-pb">${g.person.service} - ${g.person.groupe}</span></td></tr>`:'';
          return htm + g.entries.map(e => {
              var dCmt = e.comment==="Import Excel"?"":e.comment, pStr = e.period==='am'?' (Matin)':e.period==='pm'?' (Aprem)':'';
              csvData += [p2(e.day)+"/"+p2(e.month+1)+"/"+e.year, g.person.nom, g.person.service, g.person.groupe, cLabel(e.causeId), e.period==='am'?'Matin':e.period==='pm'?'Après-midi':'Jour entier', dCmt].join(";") + "\n";
              return `<tr class="bh-er"><td><span class="bh-dot"></span>${DL[dow(e.year,e.month,e.day)]} ${p2(e.day)} ${MS[e.month]}</td><td><span class="bh-cb" style="background:${cColor(e.causeId)}">${cLabel(e.causeId)}${pStr}</span></td><td class="bh-cm">${dCmt||"—"}</td></tr>`;
          }).join('');
      }).join('');
      body = `<div class="bh-wrap"><table class="bh-tbl"><thead><tr><th style="width:180px">Date</th><th style="width:200px">Type</th><th>Commentaire</th></tr></thead><tbody>${tbody}</tbody></table></div>`;
    }
  }
  
  var filtresHdr = bm.type!=='person' ? `<div class="bm-hf"><select id="bmFs"><option value="">Tous les services</option>${selOpts(ST.services,fs)}</select><select id="bmFg"><option value="">Tous les groupes</option>${selOpts(ST.groupes,fg)}</select><button class="btn p" id="bCsv" style="padding:6px 12px; margin-left:8px; font-size:11px">📥 Export CSV</button></div>` : `<div class="bm-hf"><button class="btn p" id="bCsv" style="padding:6px 12px; margin-left:8px; font-size:11px">📥 Export CSV</button></div>`;
  ST._currentCsv = csvData; ST._currentCsvName = title.replace(/\s+/g, "_") + ".csv";
  ov.innerHTML = `<div class="bm"><div class="bm-hdr"><div class="bm-hl"><span style="font-size:24px; color:var(--primary)">${bm.type==='person'?'👤':'&#128337;'}</span><h2>${title}</h2>${filtresHdr}</div><button class="bm-x" id="clBm">&#10005;</button></div><div class="bm-body">${badge?`<div class="bm-bdg">${badge}</div>`:""}<div class="bm-stats">${stats}</div>${body}</div></div>`;
  return ov;
}

;

document.addEventListener("click", function(e) {
    if (e.target.closest('#addP')) { ST.eModal = {}; renderApp(); return; }
    var btnEp = e.target.closest('.edit-pers'); if (btnEp) { ST.eModal = { pid: parseInt(btnEp.getAttribute("data-ep")) }; renderApp(); return; }
    if (e.target.closest('#addC')) { ST.pModal = {}; renderApp(); return; }
    var btnEc = e.target.closest('.edit-cause'); if (btnEc) { ST.pModal = Object.assign({}, ST.causes.find(c=>c.id===parseInt(btnEc.getAttribute("data-ec")))); renderApp(); return; }
    if (e.target.closest('#addSvcBtn')) { var valSvc = document.getElementById("newSvc").value.trim(); if(valSvc && ST.services.indexOf(valSvc) === -1){ ST.services.push(valSvc); ST.services.sort(); saveConfig(); renderApp(); } return; }
    var btnEditSvc = e.target.closest('.edit-svc'); if (btnEditSvc) { ST.svcModal = { oldVal: btnEditSvc.getAttribute("data-editsvc") }; renderModals(); return; }
    var btnDelSvc = e.target.closest('.del-svc'); if (btnDelSvc) { ST.services = ST.services.filter(s=>s !== btnDelSvc.getAttribute("data-svc")); saveConfig(); renderApp(); return; }
    if (e.target.closest('#addGrpBtn')) { var valGrp = document.getElementById("newGrp").value.trim(); if(valGrp && ST.groupes.indexOf(valGrp) === -1){ ST.groupes.push(valGrp); ST.groupes.sort(); saveConfig(); renderApp(); } return; }
    var btnEditGrp = e.target.closest('.edit-grp'); if (btnEditGrp) { ST.grpModal = { oldVal: btnEditGrp.getAttribute("data-editgrp") }; renderModals(); return; }
    var btnDelGrp = e.target.closest('.del-grp'); if (btnDelGrp) { ST.groupes = ST.groupes.filter(g=>g !== btnDelGrp.getAttribute("data-grp")); saveConfig(); renderApp(); return; }
});

document.addEventListener("mousedown", function(e) {
    if (e.button !== 0 || !ST.selectedCauseId) return; 
    var ec = e.target.closest('.ec[data-pid]');
    if (ec) {
        e.preventDefault(); 
        var pid = parseInt(ec.getAttribute("data-pid"));
        if (!ST.isAdmin && String(pid) !== String(ST.currentUser)) { showToast("Vous ne pouvez modifier que votre propre planning.", true); return; }
        var day = parseInt(ec.getAttribute("data-day")), mo = parseInt(ec.getAttribute("data-month"));
        if(pid && day) { ST.drag.active = true; ST.drag.pid = pid; ST.drag.startDt = new Date(ST.year, mo, day).getTime(); ST.drag.endDt = ST.drag.startDt; updateDragHighlight(); }
    }
});

document.addEventListener("mouseover", function(e) {
    if(!ST.drag.active) return;
    var ec = e.target.closest('.ec[data-pid]');
    if (ec && parseInt(ec.getAttribute("data-pid")) === ST.drag.pid) { ST.drag.endDt = new Date(ST.year, parseInt(ec.getAttribute("data-month")), parseInt(ec.getAttribute("data-day"))).getTime(); updateDragHighlight(); }
});

document.addEventListener("mouseup", function(e) {
    if(e.button === 0 && ST.drag.active) { ST.drag.active = false; processDragSelection(); updateDragHighlight(); }
});

document.addEventListener("contextmenu", function(e) {
    var ec = e.target.closest('.ec[data-pid]');
    if(ec) {
        e.preventDefault(); var pid = parseInt(ec.getAttribute("data-pid"));
        if (!ST.isAdmin && String(pid) !== String(ST.currentUser)) { showToast("Vous ne pouvez modifier que votre propre planning.", true); return; }
        var day = parseInt(ec.getAttribute("data-day")), mo = parseInt(ec.getAttribute("data-month")), key = ec.getAttribute("data-key");
        if(pid && day) { ST.modal = {pid:pid, day:day, month:mo, key:key}; renderApp(); }
    }
});

function bindAppEvents(){
  document.querySelectorAll(".nav-tab").forEach(t=>t.addEventListener("click", e=>{ 
      if(t.id==="lockBtn"||t.id==="themeToggle"||t.id==="logoutBtn")return; 
      
      if(ST.tab === 'planning') { var gc = document.querySelector(".gc"); if(gc) { ST.scrollPlanX = gc.scrollLeft; ST.scrollPlanY = gc.scrollTop; } }
      else if (ST.tab === 'calendrier') { var cw = document.querySelector(".cal-wrapper"); if(cw) { ST.scrollCalX = cw.scrollLeft; ST.scrollCalY = cw.scrollTop; } }
      
      if(t.hasAttribute("data-tab")){ST.tab=t.getAttribute("data-tab");renderApp();} 
  }));
  
  var lgBtn = document.getElementById("logoutBtn"); if(lgBtn) lgBtn.addEventListener("click", ()=>{ localStorage.removeItem('artt-user'); ST.isAdmin=false; ST.currentUser=null; ST.tab='calendrier'; renderApp(); });
  var thTog = document.getElementById("themeToggle"); if(thTog) thTog.addEventListener("click", ()=>{ var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('artt-theme',n); renderApp(); });
  var pY=document.getElementById("pY"); if(pY)pY.addEventListener("click", ()=>{ST.year--;renderApp();});
  var nY=document.getElementById("nY"); if(nY)nY.addEventListener("click", ()=>{ST.year++;renderApp();});
  
  var aC = document.getElementById("adminCode"); 
  if(aC) aC.addEventListener("input", e=>{ 
      if(e.target.value==="2214"){
          ST.isAdmin=true;
          ST.tab='personnel';
          renderApp();
          showToast("Mode Administrateur activé");
      } 
  });
  
  var lB = document.getElementById("lockBtn"); if(lB) lB.addEventListener("click", ()=>{ ST.isAdmin=false; if(ST.tab!=='calendrier')ST.tab='calendrier'; renderApp(); });
  
  document.querySelectorAll(".month-btn").forEach(b=>b.addEventListener("click", e=>{ 
      var m=e.currentTarget.getAttribute("data-month"), el=document.getElementById("m-start-"+m), gc=document.querySelector(".gc"); 
      if(el&&gc){ 
          ST.ignoreScroll=true; 
          gc.scrollTo({left:el.offsetLeft-getNameColWidth(), behavior:"smooth"}); 
          setTimeout(()=>{ST.ignoreScroll=false; ST.scrollPlanX=gc.scrollLeft;},600); 
      } 
  }));
  
  var gcElem = document.querySelector(".gc"); 
  if(gcElem && ST.tab==="planning") gcElem.addEventListener("scroll", ()=>{ 
      if(ST.ignoreScroll)return; 
      ST.scrollPlanX=gcElem.scrollLeft; 
      ST.scrollPlanY=gcElem.scrollTop; 
      updateMonthHighlight(gcElem.scrollLeft); 
  });
  
  var calElem = document.querySelector(".cal-wrapper"); 
  if(calElem && ST.tab==="calendrier") calElem.addEventListener("scroll", ()=>{ 
      if(ST.ignoreScroll)return; 
      ST.scrollCalX=calElem.scrollLeft; 
      ST.scrollCalY=calElem.scrollTop; 
  });
  
  var calSvc=document.getElementById("calSvc"); if(calSvc) calSvc.addEventListener("change", ()=>{ST.calSvc=calSvc.value;ST.calPid="";renderApp();});
  var calPid=document.getElementById("calPid"); if(calPid) calPid.addEventListener("change", ()=>{ST.calPid=calPid.value;renderApp();});
  
  var fSvc=document.getElementById("fSvc"); if(fSvc)fSvc.addEventListener("change", ()=>{ST.fSvc=fSvc.value;renderApp();});
  var fGrp=document.getElementById("fGrp"); if(fGrp)fGrp.addEventListener("change", ()=>{ST.fGrp=fGrp.value;renderApp();});
  var fSearch=document.getElementById("fSearch"); if(fSearch)fSearch.addEventListener("input", e=>{ST.fSearch=e.target.value;renderApp();});
  
  var bS0=document.getElementById("bS0"); if(bS0)bS0.addEventListener("click", ()=>{ST.bModal={type:"semaine_courante"};renderApp();});
  var bS1=document.getElementById("bS1"); if(bS1)bS1.addEventListener("click", ()=>{ST.bModal={type:"semaine"};renderApp();});
  var bS_next=document.getElementById("bS_next"); if(bS_next)bS_next.addEventListener("click", ()=>{ST.bModal={type:"semaine_prochaine"};renderApp();});
  var bM1=document.getElementById("bM1"); if(bM1)bM1.addEventListener("click", ()=>{ST.bModal={type:"mois"};renderApp();});
  var bAn=document.getElementById("bAn"); if(bAn)bAn.addEventListener("click", ()=>{ST.bModal={type:"conge"};renderApp();});
  
  document.querySelectorAll(".btn-bp[data-bpp]").forEach(b=>b.addEventListener("click", ()=>{ ST.bModal={type:"person", pid:parseInt(b.getAttribute("data-bpp"))}; renderApp(); }));
  var bHelp = document.getElementById("bHelp"); if(bHelp)bHelp.addEventListener("click", ()=>{ST.tutoModal=true;renderApp();});
  
  document.querySelectorAll(".legend-pill[data-cause]").forEach(p=>p.addEventListener("click", e=>{ var cidAttr=e.currentTarget.getAttribute("data-cause"), cid=(cidAttr==='erase')?'erase':parseInt(cidAttr); ST.selectedCauseId=(ST.selectedCauseId===cid)?null:cid; document.querySelectorAll(".legend-pill[data-cause]").forEach(pl=>{ var pCid=pl.getAttribute("data-cause")==='erase'?'erase':parseInt(pl.getAttribute("data-cause")); if(pCid===ST.selectedCauseId){pl.classList.add("active");pl.style.borderColor=pl.style.color;}else{pl.classList.remove("active");pl.style.borderColor="transparent";} }); }));
  document.querySelectorAll(".period-btn[data-period]").forEach(b=>b.addEventListener("click", e=>{ ST.selectedPeriod=e.currentTarget.getAttribute("data-period"); document.querySelectorAll(".period-btn").forEach(pb=>pb.classList.remove("active")); e.currentTarget.classList.add("active"); }));
  
  var btnExport = document.getElementById("btnExportGlobalXlsx"); if(btnExport) btnExport.addEventListener("click", ()=>{
      if(typeof XLSX === 'undefined') { showToast("Patientez, chargement de l'export...", true); return; }
      var data = [["Date", "Employé", "Service", "Groupe", "Cause", "Période", "Commentaire"]];
      var keys = Object.keys(ST.events).filter(k=>k!=="__personnels__"&&k.split('-').length>=4).sort((a,b)=>new Date(a.split('-')[1],a.split('-')[2],a.split('-')[3]).getTime()-new Date(b.split('-')[1],b.split('-')[2],b.split('-')[3]).getTime());
      keys.forEach(k => {
          var ev=ST.events[k], pts=k.split('-'), p=ST.personnels.find(x=>String(x.id)===String(pts[0])), dtStr=p2(pts[3])+"/"+p2(parseInt(pts[2])+1)+"/"+pts[1]; if(!p)return;
          if(ev.type==='full') data.push([dtStr,p.nom,p.service,p.groupe,cLabel(ev.causeId),'Jour entier',ev.comment==="Import Excel"?"":ev.comment||""]);
          else if(ev.type==='half'){ if(ev.am)data.push([dtStr,p.nom,p.service,p.groupe,cLabel(ev.am.causeId),'Matin',ev.am.comment==="Import Excel"?"":ev.am.comment||""]); if(ev.pm)data.push([dtStr,p.nom,p.service,p.groupe,cLabel(ev.pm.causeId),'Après-midi',ev.pm.comment==="Import Excel"?"":ev.pm.comment||""]); }
      });
      var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "Absences"); XLSX.writeFile(wb, "Planning_Absences_" + ST.year + ".xlsx"); showToast("Export réussi");
  });
  
  var btnImp = document.getElementById("btnImportExcel"), fImp = document.getElementById("excelImportFile");
  if(btnImp && fImp) btnImp.addEventListener("click", ()=>{ if(!fImp.files||!fImp.files[0]){showToast("Sélectionnez un fichier Excel",true);return;} var r=new FileReader(); r.onload=e=>processExcelImport(e.target.result); r.readAsArrayBuffer(fImp.files[0]); });
}

function bindModalEvents() {
  var mOv=document.getElementById("mOv"),cMod=document.getElementById("cMod"),sMod=document.getElementById("sMod"),dEvBtn=document.getElementById("dEv");
  if(mOv)mOv.addEventListener("click", e=>{if(e.target===mOv){ST.modal=null;renderApp();}});
  if(cMod)cMod.addEventListener("click", ()=>{ST.modal=null;renderApp();});
  if(dEvBtn)dEvBtn.addEventListener("click", ()=>{ var k=ST.modal.key; delete ST.events[k]; ST.modal=null; renderApp(); saveEvsDB([], [k, k+'-am', k+'-pm']).then(()=>showToast("Absence supprimée")); });
  if(sMod)sMod.addEventListener("click", ()=>{
    var cid_full=parseInt(document.getElementById("mC_full").value)||null, cm_full=document.getElementById("mCm_full").value.trim(), k=ST.modal.key;
    var up=[], del=[];
    
    if(cid_full){ 
        ST.events[k]={type:'full',causeId:cid_full,comment:cm_full}; 
        up.push({id:k,cause_id:cid_full,comment:cm_full}); 
        del.push(k+'-am',k+'-pm'); 
    } else { 
        delete ST.events[k]; 
        del.push(k,k+'-am',k+'-pm'); 
    }
    
    ST.modal=null; renderApp(); saveEvsDB(up, del).then(()=>showToast("Absence enregistrée"));
  });
  
  var cEd=document.getElementById("cEd"),sEd=document.getElementById("sEd"),dPer=document.getElementById("dPer");
  if(cEd)cEd.addEventListener("click", ()=>{ST.eModal=null;renderApp();});
  if(dPer)dPer.addEventListener("click", ()=>{ ST.personnels=ST.personnels.filter(p=>String(p.id)!==String(ST.eModal.pid)); ST.eModal=null; saveConfig(); renderApp(); });
  if(sEd)sEd.addEventListener("click", ()=>{
    var nom=document.getElementById("eNom").value, svc=document.getElementById("eSvc").value.trim(), grp=document.getElementById("eGrp").value.trim(), inact=document.getElementById("eInactive") ? document.getElementById("eInactive").checked : false; if(!nom)return;
    var rPwdCb = document.getElementById("eResetPwd"); var doReset = rPwdCb ? rPwdCb.checked : false;
    if(svc&&ST.services.indexOf(svc)===-1)ST.services.push(svc); if(grp&&ST.groupes.indexOf(grp)===-1)ST.groupes.push(grp);
    if(ST.eModal.pid){ var p=ST.personnels.find(x=>String(x.id)===String(ST.eModal.pid)); if(p){p.nom=nom;p.service=svc;p.groupe=grp;p.inactive=inact; if(doReset) delete p.pwd;} }
    else{ ST.personnels.push({id:Date.now(),nom:nom,service:svc,groupe:grp,inactive:inact}); }
    ST.eModal=null; saveConfig(); renderApp(); if(doReset) showToast("Mot de passe réinitialisé.");
  });
  
  var cPar=document.getElementById("cPar"),sPar=document.getElementById("sPar"),dPar=document.getElementById("dPar");
  if(cPar)cPar.addEventListener("click", ()=>{ST.pModal=null;renderApp();});
  if(dPar)dPar.addEventListener("click", ()=>{ ST.causes=ST.causes.filter(c=>c.id!==ST.pModal.id); ST.pModal=null; saveConfig(); renderApp(); });
  if(sPar)sPar.addEventListener("click", ()=>{
    var lbl=document.getElementById("pLbl").value, col=document.getElementById("pCol").value, sh=document.getElementById("pSh").value; if(!lbl)return;
    if(ST.pModal.id){ var c=ST.causes.find(x=>x.id===ST.pModal.id); if(c){c.label=lbl;c.color=col;c.short=sh;} }
    else{ ST.causes.push({id:Math.max(0,...ST.causes.map(c=>c.id))+1,label:lbl,color:col,short:sh||String(Math.max(0,...ST.causes.map(c=>c.id))+1)}); }
    ST.pModal=null; saveConfig(); renderApp();
  });

  var cSvc=document.getElementById("cSvc"), sSvc=document.getElementById("sSvc"), svcOv=document.getElementById("svcOv");
  if(cSvc) cSvc.addEventListener("click", ()=>{ ST.svcModal=null; renderModals(); });
  if(svcOv) svcOv.addEventListener("click", e=>{ if(e.target===svcOv){ ST.svcModal=null; renderModals(); } });
  if(sSvc) sSvc.addEventListener("click", ()=>{ var nv=document.getElementById("editSvcVal").value.trim(); if(nv&&nv!==ST.svcModal.oldVal){ ST.services[ST.services.indexOf(ST.svcModal.oldVal)]=nv; ST.personnels.forEach(p=>{if(p.service===ST.svcModal.oldVal)p.service=nv;}); ST.services.sort(); ST.svcModal=null; saveConfig(); renderApp(); }else{ ST.svcModal=null; renderModals(); } });

  var cGrp=document.getElementById("cGrp"), sGrp=document.getElementById("sGrp"), grpOv=document.getElementById("grpOv");
  if(cGrp) cGrp.addEventListener("click", ()=>{ ST.grpModal=null; renderModals(); });
  if(grpOv) grpOv.addEventListener("click", e=>{ if(e.target===grpOv){ ST.grpModal=null; renderModals(); } });
  if(sGrp) sGrp.addEventListener("click", ()=>{ var nv=document.getElementById("editGrpVal").value.trim(); if(nv&&nv!==ST.grpModal.oldVal){ ST.groupes[ST.groupes.indexOf(ST.grpModal.oldVal)]=nv; ST.personnels.forEach(p=>{if(p.groupe===ST.grpModal.oldVal)p.groupe=nv;}); ST.groupes.sort(); ST.grpModal=null; saveConfig(); renderApp(); }else{ ST.grpModal=null; renderModals(); } });
  
  var bmFs=document.getElementById("bmFs"),bmFg=document.getElementById("bmFg"),bCsv=document.getElementById("bCsv");
  if(bmFs)bmFs.addEventListener("change", ()=>{ST.bModal.fs=bmFs.value;renderModals();});
  if(bmFg)bmFg.addEventListener("change", ()=>{ST.bModal.fg=bmFg.value;renderModals();});
  if(bCsv)bCsv.addEventListener("click", ()=>{exportCSV(ST._currentCsvName, ST._currentCsv);});
  var clBm=document.getElementById("clBm"),bmOv=document.getElementById("bmOv");
  if(clBm)clBm.addEventListener("click", ()=>{ST.bModal=null;renderApp();});
  if(bmOv)bmOv.addEventListener("click", e=>{if(e.target===bmOv){ST.bModal=null;renderApp();}});
  
  var clTuto=document.getElementById("clTuto"), tutoOv=document.getElementById("tutoOv"), btnGotIt=document.getElementById("btnGotIt");
  if(clTuto)clTuto.addEventListener("click", ()=>{ST.tutoModal=false;renderApp();});
  if(btnGotIt)btnGotIt.addEventListener("click", ()=>{ST.tutoModal=false;renderApp();});
  if(tutoOv)tutoOv.addEventListener("click", e=>{if(e.target===tutoOv){ST.tutoModal=false;renderApp();}});
}

// === DEMARRAGE ===
if(checkGasUrl()) {
    loadDB().then(function(res){
      if(res){ ST.events=Object.assign({},XLS,res.events); if(res.personnels&&res.personnels.length>0)ST.personnels=res.personnels; if(res.causes&&res.causes.length>0)ST.causes=res.causes; if(res.services&&res.services.length>0)ST.services=res.services; if(res.groupes&&res.groupes.length>0)ST.groupes=res.groupes; }
      ST.loaded=true; renderApp(); if(!ST.initialScrollDone){scrollTd();ST.initialScrollDone=true;} showToast("Planning synchronisé");
    }).catch(function(e){
      console.warn("Mode hors ligne"); ST.loaded=true; renderApp(); if(!ST.initialScrollDone){scrollTd();ST.initialScrollDone=true;} showToast("Mode hors ligne activé", true);
    });

    setInterval(function(){
      loadDB().then(function(res){
        if(res){
          var oE=JSON.stringify(ST.events), oP=JSON.stringify(ST.personnels), oC=JSON.stringify(ST.causes), oS=JSON.stringify(ST.services), oG=JSON.stringify(ST.groupes);
          var tE=Object.assign({},XLS,res.events), tP=(res.personnels&&res.personnels.length>0)?res.personnels:ST.personnels, tC=(res.causes&&res.causes.length>0)?res.causes:ST.causes, tS=(res.services&&res.services.length>0)?res.services:ST.services, tG=(res.groupes&&res.groupes.length>0)?res.groupes:ST.groupes;
          if (JSON.stringify(tE)!==oE || JSON.stringify(tP)!==oP || JSON.stringify(tC)!==oC || JSON.stringify(tS)!==oS || JSON.stringify(tG)!==oG) {
              ST.events=tE; ST.personnels=tP; ST.causes=tC; ST.services=tS; ST.groupes=tG;
              if(ST.tab==="planning"&&!ST.modal&&!ST.bModal&&!ST.tutoModal) renderApp();
          }
        }
      });
    }, 60000);
} else {
    renderApp();
}
