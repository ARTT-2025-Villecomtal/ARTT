// === EVENEMENTS APP PRINCIPALE ===
function bindAppEvents(){
  var navTabs=document.querySelectorAll(".nav-tab");
  for(var i=0;i<navTabs.length;i++){(function(t){t.addEventListener("click",function(){
      if(t.id === "lockBtn" || t.id === "themeToggle") return; 
      if(t.hasAttribute("data-tab")) {
          ST.tab=t.getAttribute("data-tab");renderApp();
      }
  });})(navTabs[i]);}
  
  var themeToggle = document.getElementById("themeToggle");
  if(themeToggle) {
      themeToggle.addEventListener("click", function() {
          var currentTheme = document.documentElement.getAttribute('data-theme');
          var newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', newTheme);
          localStorage.setItem('artt-theme', newTheme);
          renderApp(); 
      });
  }

  var pY=document.getElementById("pY"),nY=document.getElementById("nY");
  if(pY)pY.addEventListener("click",function(){ST.year--;renderApp();});
  if(nY)nY.addEventListener("click",function(){ST.year++;renderApp();});
  
  // -- Code Admin --
  var adminCode = document.getElementById("adminCode");
  if(adminCode) {
      adminCode.addEventListener("input", function(e) {
          if(e.target.value === "2214") {
              ST.isAdmin = true;
              renderApp();
          }
      });
  }
  var lockBtn = document.getElementById("lockBtn");
  if(lockBtn) {
      lockBtn.addEventListener("click", function() {
          ST.isAdmin = false;
          if(ST.tab !== 'planning') ST.tab = 'planning';
          renderApp();
      });
  }

  // ScrollSpy et Navigation Mois
  var mbs=document.querySelectorAll(".month-btn");
  for(var i=0;i<mbs.length;i++){(function(b){
      b.addEventListener("click",function(e){
          var m=e.currentTarget.getAttribute("data-month");
          var el=document.getElementById("m-start-"+m);
          var gc=document.querySelector(".gc");
          if(el && gc) {
              ST.ignoreScroll = true;
              var offset = el.offsetLeft - getNameColWidth(); 
              gc.scrollTo({left: offset, behavior: "smooth"});
              setTimeout(function(){ ST.ignoreScroll = false; ST.lastScrollX = gc.scrollLeft; }, 500);
          }
      });
  })(mbs[i]);}

  var gcElem = document.querySelector(".gc");
  if(gcElem && ST.tab === "planning") {
      gcElem.addEventListener("scroll", function() {
          if(ST.ignoreScroll) return;
          var sl = gcElem.scrollLeft;
          ST.lastScrollX = sl; 
          ST.lastScrollY = gcElem.scrollTop;
          
          var activeM = 0;
          for(var m=11; m>=0; m--) {
              var el = document.getElementById("m-start-" + m);
              if(el && (el.offsetLeft - getNameColWidth()) <= sl + 150) { 
                  activeM = m;
                  break;
              }
          }
          document.querySelectorAll(".month-btn").forEach(function(b) {
              if(parseInt(b.getAttribute("data-month")) === activeM) b.classList.add("active");
              else b.classList.remove("active");
          });
      });
  }
  
  var fSvc=document.getElementById("fSvc"),fGrp=document.getElementById("fGrp"), fSearch=document.getElementById("fSearch");
  if(fSvc)fSvc.addEventListener("change",function(){ST.fSvc=fSvc.value;renderApp();});
  if(fGrp)fGrp.addEventListener("change",function(){ST.fGrp=fGrp.value;renderApp();});
  if(fSearch)fSearch.addEventListener("input",function(e){ST.fSearch=e.target.value;renderApp();});
  
  var bS0=document.getElementById("bS0"),bS1=document.getElementById("bS1"),bM1=document.getElementById("bM1"),bAn=document.getElementById("bAn");
  if(bS0)bS0.addEventListener("click",function(){ST.bModal={type:"semaine_courante"};renderModals();});
  if(bS1)bS1.addEventListener("click",function(){ST.bModal={type:"semaine"};renderModals();});
  if(bM1)bM1.addEventListener("click",function(){ST.bModal={type:"mois"};renderModals();});
  if(bAn)bAn.addEventListener("click",function(){ST.bModal={type:"conge"};renderModals();});
  
  var bpps=document.querySelectorAll(".btn-bp[data-bpp]");
  for(var i=0;i<bpps.length;i++){(function(btn){
      btn.addEventListener("click", function(){
          ST.bModal={type:"person", pid: parseInt(btn.getAttribute("data-bpp"))};
          renderModals();
      });
  })(bpps[i]);}
  
  var bHelp = document.getElementById("bHelp");
  if(bHelp)bHelp.addEventListener("click",function(){ST.tutoModal=true;renderModals();});

  // -- MODE PINCEAU --
  var pills = document.querySelectorAll(".legend-pill[data-cause]");
  for(var i=0;i<pills.length;i++){
     pills[i].addEventListener("click", function(e) {
         var cidAttr = e.currentTarget.getAttribute("data-cause");
         var cid = (cidAttr === 'erase') ? 'erase' : parseInt(cidAttr);
         ST.selectedCauseId = (ST.selectedCauseId === cid) ? null : cid;
         
         document.querySelectorAll(".legend-pill[data-cause]").forEach(function(p) {
             var pCid = p.getAttribute("data-cause") === 'erase' ? 'erase' : parseInt(p.getAttribute("data-cause"));
             if (pCid === ST.selectedCauseId) {
                 p.classList.add("active");
                 p.style.borderColor = p.style.color;
             } else {
                 p.classList.remove("active");
                 p.style.borderColor = "transparent";
             }
         });
     });
  }
  var pBtns = document.querySelectorAll(".period-btn[data-period]");
  for(var i=0;i<pBtns.length;i++){
     pBtns[i].addEventListener("click", function(e) {
         ST.selectedPeriod = e.currentTarget.getAttribute("data-period");
         document.querySelectorAll(".period-btn").forEach(function(b) { b.classList.remove("active"); });
         e.currentTarget.classList.add("active");
     });
  }

  // CLICS SUR LA GRILLE (Saisie Rapide Uniquement)
  var ecs=document.querySelectorAll(".ec[data-pid]");
  for(var i=0;i<ecs.length;i++){(function(ec){
    ec.addEventListener("click",function(e){
      var pid=parseInt(ec.getAttribute("data-pid"));
      var day=parseInt(ec.getAttribute("data-day"));
      var mo=parseInt(ec.getAttribute("data-month"));
      var baseKey=ec.getAttribute("data-key");
      
      // LE CLIC GAUCHE NE FAIT QUELQUE CHOSE QUE SI UN OUTIL EST SELECTIONNÉ
      if(pid && day && ST.selectedCauseId) {
             var existing = ST.events[baseKey];
             var upserts = [];
             var deletes = [];

             if (ST.selectedCauseId === 'erase') {
                 // GOMME
                 if (ST.selectedPeriod === 'full') {
                     if (existing) {
                         delete ST.events[baseKey];
                         deletes.push(baseKey, baseKey+'-am', baseKey+'-pm');
                     }
                 } else if (ST.selectedPeriod === 'am') {
                     if (existing && existing.type === 'full') {
                         ST.events[baseKey] = { type: 'half', am: null, pm: {causeId: existing.causeId, comment: existing.comment} };
                         upserts.push({id: baseKey+'-pm', cause_id: existing.causeId, comment: existing.comment});
                         deletes.push(baseKey, baseKey+'-am');
                     } else if (existing && existing.type === 'half' && existing.am) {
                         existing.am = null;
                         deletes.push(baseKey+'-am');
                         if (!existing.pm) delete ST.events[baseKey];
                     }
                 } else if (ST.selectedPeriod === 'pm') {
                     if (existing && existing.type === 'full') {
                         ST.events[baseKey] = { type: 'half', am: {causeId: existing.causeId, comment: existing.comment}, pm: null };
                         upserts.push({id: baseKey+'-am', cause_id: existing.causeId, comment: existing.comment});
                         deletes.push(baseKey, baseKey+'-pm');
                     } else if (existing && existing.type === 'half' && existing.pm) {
                         existing.pm = null;
                         deletes.push(baseKey+'-pm');
                         if (!existing.am) delete ST.events[baseKey];
                     }
                 }
             } else {
                 // LOGIQUE ASTREINTE : Force sur "Matin" (am) pour libérer le bas
                 var targetPeriod = ST.selectedPeriod;
                 var causeObj = ST.causes.find(function(c){return c.id === ST.selectedCauseId});
                 var isAstreinte = false;
                 if(causeObj && causeObj.label.toUpperCase().indexOf('ASTREINTE') > -1) {
                     isAstreinte = true;
                     if (targetPeriod === 'full') targetPeriod = 'am'; 
                 }
                 
                 // --- NOUVELLE LOGIQUE TOLÉRANCE ASTREINTE ---
                 var conflict = false;
                 var bypassSpecial = false;

                 // Cas 1 : On ajoute Astreinte (am) sur une case Pleine (full) existante
                 if (targetPeriod === 'am' && isAstreinte && existing && existing.type === 'full') {
                     var oldCause = existing.causeId;
                     var oldCmt = existing.comment;
                     ST.events[baseKey] = { type: 'half', am: {causeId: ST.selectedCauseId, comment: ''}, pm: {causeId: oldCause, comment: oldCmt} };
                     upserts.push({id: baseKey+'-am', cause_id: ST.selectedCauseId, comment: ''});
                     upserts.push({id: baseKey+'-pm', cause_id: oldCause, comment: oldCmt});
                     deletes.push(baseKey);
                     bypassSpecial = true;
                 }
                 // Cas 2 : On ajoute un motif Plein (full) sur une demi-case existante
                 else if (targetPeriod === 'full' && existing && existing.type === 'half' && (!existing.am || !existing.pm)) {
                     var exAmAst = false, exPmAst = false;
                     if(existing.am) {
                         var cObj1 = ST.causes.find(function(c){return c.id === existing.am.causeId;});
                         if(cObj1 && cObj1.label.toUpperCase().indexOf('ASTREINTE') > -1) exAmAst = true;
                     }
                     if(existing.pm) {
                         var cObj2 = ST.causes.find(function(c){return c.id === existing.pm.causeId;});
                         if(cObj2 && cObj2.label.toUpperCase().indexOf('ASTREINTE') > -1) exPmAst = true;
                     }
                     
                     if (exAmAst && !existing.pm) {
                         ST.events[baseKey].pm = {causeId: ST.selectedCauseId, comment: ''};
                         upserts.push({id: baseKey+'-pm', cause_id: ST.selectedCauseId, comment: ''});
                         bypassSpecial = true;
                     } else if (exPmAst && !existing.am) {
                         ST.events[baseKey].am = {causeId: ST.selectedCauseId, comment: ''};
                         upserts.push({id: baseKey+'-am', cause_id: ST.selectedCauseId, comment: ''});
                         bypassSpecial = true;
                     }
                 }

                 if (!bypassSpecial) {
                     // SAISIE NORMALE (Avec blocage anti-écrasement)
                     if (targetPeriod === 'full') {
                         if (existing) conflict = true;
                     } else if (targetPeriod === 'am') {
                         if (existing && (existing.type === 'full' || (existing.type === 'half' && existing.am))) conflict = true;
                     } else if (targetPeriod === 'pm') {
                         if (existing && (existing.type === 'full' || (existing.type === 'half' && existing.pm))) conflict = true;
                     }

                     if (conflict) {
                         showToast("Case déjà remplie ! Utilisez la gomme 🧽 pour effacer d'abord.", true);
                         return; 
                     }

                     if (targetPeriod === 'full') {
                         ST.events[baseKey] = { type: 'full', causeId: ST.selectedCauseId, comment: '' };
                         upserts.push({id: baseKey, cause_id: ST.selectedCauseId, comment: ''});
                         deletes.push(baseKey+'-am', baseKey+'-pm');
                     } else if (targetPeriod === 'am') {
                         if (!existing) ST.events[baseKey] = { type: 'half', am: null, pm: null };
                         ST.events[baseKey].am = {causeId: ST.selectedCauseId, comment: ''};
                         upserts.push({id: baseKey+'-am', cause_id: ST.selectedCauseId, comment: ''});
                         if(existing && existing.pm) deletes.push(baseKey);
                     } else if (targetPeriod === 'pm') {
                         if (!existing) ST.events[baseKey] = { type: 'half', am: null, pm: null };
                         ST.events[baseKey].pm = {causeId: ST.selectedCauseId, comment: ''};
                         upserts.push({id: baseKey+'-pm', cause_id: ST.selectedCauseId, comment: ''});
                         if(existing && existing.am) deletes.push(baseKey);
                     }
                 }
             }
             
             updateCellVisual(ec, baseKey, ST.year, mo, day);
             if(upserts.length > 0 || deletes.length > 0) {
                 saveEvsDB(upserts, deletes);
             }
      }
    });
    
    // CLIC DROIT = FORCER MODALE DE DETAILS
    ec.addEventListener("contextmenu", function(e) {
        e.preventDefault();
        var pid=parseInt(ec.getAttribute("data-pid"));
        var day=parseInt(ec.getAttribute("data-day"));
        var mo=parseInt(ec.getAttribute("data-month"));
        var key=ec.getAttribute("data-key");
        if(pid&&day){ST.modal={pid:pid,day:day,month:mo,key:key};renderModals();}
    });
  })(ecs[i]);}
  
  // Boutons Personnel
  var addP=document.getElementById("addP");
  if(addP)addP.addEventListener("click",function(){ST.eModal={};renderModals();});
  var epBtns=document.querySelectorAll("[data-ep]");
  for(var i=0;i<epBtns.length;i++){(function(b){b.addEventListener("click",function(){ST.eModal={pid:parseInt(b.getAttribute("data-ep"))};renderModals();});})(epBtns[i]);}
  
  // Boutons Paramètres (Causes)
  var addC=document.getElementById("addC");
  if(addC)addC.addEventListener("click",function(){ST.pModal={};renderModals();});
  var ecBtns=document.querySelectorAll("[data-ec]");
  for(var i=0;i<ecBtns.length;i++){(function(el){el.addEventListener("click",function(){
    var id=parseInt(el.getAttribute("data-ec"));
    for(var j=0;j<ST.causes.length;j++){if(ST.causes[j].id===id){ST.pModal=Object.assign({},ST.causes[j]);renderModals();break;}}
  });})(ecBtns[i]);}

  // Boutons Paramètres (Services)
  var addSvcBtn=document.getElementById("addSvcBtn");
  if(addSvcBtn) addSvcBtn.addEventListener("click", function(){
      var val=document.getElementById("newSvc").value.trim();
      if(val && ST.services.indexOf(val)===-1){ ST.services.push(val); ST.services.sort(); saveConfig(); renderApp(); }
  });
  var delSvcBtns=document.querySelectorAll(".del-svc");
  for(var i=0;i<delSvcBtns.length;i++){(function(b){b.addEventListener("click",function(e){
      var v = e.currentTarget.getAttribute("data-svc");
      ST.services = ST.services.filter(function(s){return s!==v;}); saveConfig(); renderApp();
  });})(delSvcBtns[i]);}
  
  // Boutons Paramètres (Groupes)
  var addGrpBtn=document.getElementById("addGrpBtn");
  if(addGrpBtn) addGrpBtn.addEventListener("click", function(){
      var val=document.getElementById("newGrp").value.trim();
      if(val && ST.groupes.indexOf(val)===-1){ ST.groupes.push(val); ST.groupes.sort(); saveConfig(); renderApp(); }
  });
  var delGrpBtns=document.querySelectorAll(".del-grp");
  for(var i=0;i<delGrpBtns.length;i++){(function(b){b.addEventListener("click",function(e){
      var v = e.currentTarget.getAttribute("data-grp");
      ST.groupes = ST.groupes.filter(function(g){return g!==v;}); saveConfig(); renderApp();
  });})(delGrpBtns[i]);}

  // EXPORT EXCEL GLOBAL
  var btnExportGlobalXlsx = document.getElementById("btnExportGlobalXlsx");
  if(btnExportGlobalXlsx) {
      btnExportGlobalXlsx.addEventListener("click", function() {
          if(typeof XLSX === 'undefined') { showToast("Veuillez patienter, chargement de l'outil d'export...", true); return; }
          var data = [["Date", "Employé", "Service", "Groupe", "Cause", "Période", "Commentaire"]];
          var keys = Object.keys(ST.events);
          keys.sort(function(a,b) {
              var pA = a.split('-'), pB = b.split('-');
              var dtA = new Date(pA[1], pA[2], pA[3]).getTime(), dtB = new Date(pB[1], pB[2], pB[3]).getTime();
              return dtA - dtB;
          });
          for(var i=0; i<keys.length; i++) {
              var k = keys[i];
              if(k === "__personnels__") continue;
              var ev = ST.events[k], parts = k.split('-'); 
              if(parts.length < 4) continue;
              var pid = parseInt(parts[0]);
              var p = ST.personnels.find(function(x){ return x.id === pid; });
              if(!p) continue;
              var dateStr = p2(parts[3]) + "/" + p2(parseInt(parts[2])+1) + "/" + parts[1];
              if(ev.type === 'full') {
                  data.push([dateStr, p.nom, p.service, p.groupe, cLabel(ev.causeId), 'Jour entier', ev.comment==="Import Excel"?"":ev.comment||""]);
              } else if(ev.type === 'half') {
                  if(ev.am) data.push([dateStr, p.nom, p.service, p.groupe, cLabel(ev.am.causeId), 'Matin', ev.am.comment==="Import Excel"?"":ev.am.comment||""]);
                  if(ev.pm) data.push([dateStr, p.nom, p.service, p.groupe, cLabel(ev.pm.causeId), 'Après-midi', ev.pm.comment==="Import Excel"?"":ev.pm.comment||""]);
              }
          }
          var ws = XLSX.utils.aoa_to_sheet(data);
          var wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Absences");
          XLSX.writeFile(wb, "Planning_Absences_Usine_" + ST.year + ".xlsx");
          showToast("Export XLSX réussi");
      });
  }

  // IMPORT EXCEL
  var btnImportExcel = document.getElementById("btnImportExcel");
  var excelImportFile = document.getElementById("excelImportFile");
  if(btnImportExcel && excelImportFile) {
      btnImportExcel.addEventListener("click", function() {
          if(!excelImportFile.files || !excelImportFile.files[0]) { showToast("Veuillez sélectionner un fichier Excel", true); return; }
          var file = excelImportFile.files[0];
          var reader = new FileReader();
          reader.onload = function(e) { processExcelImport(e.target.result); };
          reader.readAsArrayBuffer(file);
      });
  }
}

// === EVENEMENTS DES MODALES (Séparé pour ne pas casser le scroll) ===
function bindModalEvents() {
  var mOv=document.getElementById("mOv"),cMod=document.getElementById("cMod"),sMod=document.getElementById("sMod"),dEvBtn=document.getElementById("dEv");
  if(mOv)mOv.addEventListener("click",function(e){if(e.target===mOv){ST.modal=null;renderModals();}});
  if(cMod)cMod.addEventListener("click",function(){ST.modal=null;renderModals();});
  
  if(dEvBtn)dEvBtn.addEventListener("click",function(){
    var key=ST.modal.key; delete ST.events[key]; ST.modal=null; renderModals();
    var ec = document.querySelector('.ec[data-key="'+key+'"]');
    if(ec) updateCellVisual(ec, key, ST.year, ec.getAttribute('data-month'), ec.getAttribute('data-day'));
    saveEvsDB([], [key, key+'-am', key+'-pm']).then(function(){showToast("Absence supprimée");});
  });
  
  if(sMod)sMod.addEventListener("click",function(){
    var cid_am = parseInt(document.getElementById("mC_am").value) || null;
    var cm_am = document.getElementById("mCm_am").value.trim();
    var cid_pm = parseInt(document.getElementById("mC_pm").value) || null;
    var cm_pm = document.getElementById("mCm_pm").value.trim();
    var key = ST.modal.key;
    var upserts = [], deletes = [];
    
    if (cid_am && cid_pm && cid_am === cid_pm && cm_am === cm_pm) {
        ST.events[key] = {type:'full', causeId:cid_am, comment:cm_am};
        upserts.push({id:key, cause_id:cid_am, comment:cm_am});
        deletes.push(key+'-am', key+'-pm');
    } else if (cid_am || cid_pm) {
        ST.events[key] = {type:'half', am:null, pm:null};
        deletes.push(key); 
        if (cid_am) { ST.events[key].am = {causeId:cid_am, comment:cm_am}; upserts.push({id:key+'-am', cause_id:cid_am, comment:cm_am}); } else { deletes.push(key+'-am'); }
        if (cid_pm) { ST.events[key].pm = {causeId:cid_pm, comment:cm_pm}; upserts.push({id:key+'-pm', cause_id:cid_pm, comment:cm_pm}); } else { deletes.push(key+'-pm'); }
    } else {
        delete ST.events[key];
        deletes.push(key, key+'-am', key+'-pm');
    }
    ST.modal=null; renderModals();
    var ec = document.querySelector('.ec[data-key="'+key+'"]');
    if(ec) updateCellVisual(ec, key, ST.year, ec.getAttribute('data-month'), ec.getAttribute('data-day'));
    saveEvsDB(upserts, deletes).then(function(){showToast("Absence enregistrée");});
  });
  
  var cEd=document.getElementById("cEd"),sEd=document.getElementById("sEd"),dPer=document.getElementById("dPer");
  if(cEd)cEd.addEventListener("click",function(){ST.eModal=null;renderModals();});
  if(dPer)dPer.addEventListener("click",function(){
    var pid=ST.eModal.pid; ST.personnels=ST.personnels.filter(function(p){return p.id!==pid;});
    ST.eModal=null; saveConfig(); renderApp();
  });
  if(sEd)sEd.addEventListener("click",function(){
    var nom=document.getElementById("eNom").value;
    var svc=document.getElementById("eSvc").value.trim();
    var grp=document.getElementById("eGrp").value.trim();
    if(!nom)return;
    if(svc && ST.services.indexOf(svc) === -1) ST.services.push(svc);
    if(grp && ST.groupes.indexOf(grp) === -1) ST.groupes.push(grp);
    
    if(ST.eModal.pid){
      for(var i=0;i<ST.personnels.length;i++){if(ST.personnels[i].id===ST.eModal.pid){ST.personnels[i].nom=nom;ST.personnels[i].service=svc;ST.personnels[i].groupe=grp;break;}}
    }else{
      ST.personnels.push({id:Date.now(),nom:nom,service:svc,groupe:grp});
    }
    ST.eModal=null; saveConfig(); renderApp();
  });
  
  var cPar=document.getElementById("cPar"),sPar=document.getElementById("sPar"),dPar=document.getElementById("dPar");
  if(cPar)cPar.addEventListener("click",function(){ST.pModal=null;renderModals();});
  if(dPar)dPar.addEventListener("click",function(){
    var id=ST.pModal.id; ST.causes=ST.causes.filter(function(c){return c.id!==id;});
    ST.pModal=null; saveConfig(); renderApp();
  });
  if(sPar)sPar.addEventListener("click",function(){
    var lbl=document.getElementById("pLbl").value;
    var col=document.getElementById("pCol").value;
    var sh=document.getElementById("pSh").value;
    if(!lbl)return;
    if(ST.pModal.id){
      for(var i=0;i<ST.causes.length;i++){if(ST.causes[i].id===ST.pModal.id){ST.causes[i].label=lbl;ST.causes[i].color=col;ST.causes[i].short=sh;break;}}
    }else{
      var maxId=0;
      for(var i=0;i<ST.causes.length;i++){ if(ST.causes[i].id>maxId) maxId=ST.causes[i].id; }
      ST.causes.push({id:maxId+1,label:lbl,color:col,short:sh||String(maxId+1)});
    }
    ST.pModal=null; saveConfig(); renderApp();
  });
  
  var bmFs=document.getElementById("bmFs"),bmFg=document.getElementById("bmFg"),bCsv=document.getElementById("bCsv");
  if(bmFs)bmFs.addEventListener("change",function(){ST.bModal.fs=bmFs.value;renderModals();});
  if(bmFg)bmFg.addEventListener("change",function(){ST.bModal.fg=bmFg.value;renderModals();});
  if(bCsv)bCsv.addEventListener("click",function(){exportCSV(ST._currentCsvName, ST._currentCsv);});
  var clBm=document.getElementById("clBm"),bmOv=document.getElementById("bmOv");
  if(clBm)clBm.addEventListener("click",function(){ST.bModal=null;renderModals();});
  if(bmOv)bmOv.addEventListener("click",function(e){if(e.target===bmOv){ST.bModal=null;renderModals();}});
  
  var clTuto = document.getElementById("clTuto"), tutoOv = document.getElementById("tutoOv"), btnGotIt = document.getElementById("btnGotIt");
  if(clTuto)clTuto.addEventListener("click",function(){ST.tutoModal=false;renderModals();});
  if(btnGotIt)btnGotIt.addEventListener("click",function(){ST.tutoModal=false;renderModals();});
  if(tutoOv)tutoOv.addEventListener("click",function(e){if(e.target===tutoOv){ST.tutoModal=false;renderModals();}});
}

// === DEMARRAGE ET SYNCHRONISATION OPTIMISÉE ===
if(checkGasUrl()) {
    renderApp();

    loadDB().then(function(res){
      if(res){
        ST.events = Object.assign({}, XLS, res.events);
        if(res.personnels && res.personnels.length > 0){ ST.personnels = res.personnels; }
        if(res.causes && res.causes.length > 0){ ST.causes = res.causes; }
        if(res.services && res.services.length > 0){ ST.services = res.services; }
        if(res.groupes && res.groupes.length > 0){ ST.groupes = res.groupes; }
      }
      ST.loaded = true;
      renderApp();
      setTimeout(scrollTd, 300);
      showToast("Planning synchronisé");
    }).catch(function(e){
      console.error("Google Sheets Error:",e);
      ST.loaded = true;
      renderApp();
      setTimeout(scrollTd, 300);
      showToast("Mode hors ligne ou Erreur URL", true);
    });

    setInterval(function(){
      loadDB().then(function(res){
        if(res){
          var oldEvStr = JSON.stringify(ST.events);
          var oldPStr = JSON.stringify(ST.personnels);
          var oldCStr = JSON.stringify(ST.causes);
          var oldSStr = JSON.stringify(ST.services);
          var oldGStr = JSON.stringify(ST.groupes);
          
          var tempEvents = Object.assign({}, XLS, res.events);
          var tempPers = (res.personnels && res.personnels.length > 0) ? res.personnels : ST.personnels;
          var tempCauses = (res.causes && res.causes.length > 0) ? res.causes : ST.causes;
          var tempSvc = (res.services && res.services.length > 0) ? res.services : ST.services;
          var tempGrp = (res.groupes && res.groupes.length > 0) ? res.groupes : ST.groupes;
          
          if (JSON.stringify(tempEvents) !== oldEvStr || 
              JSON.stringify(tempPers) !== oldPStr || 
              JSON.stringify(tempCauses) !== oldCStr || 
              JSON.stringify(tempSvc) !== oldSStr || 
              JSON.stringify(tempGrp) !== oldGStr) {
              
              ST.events = tempEvents;
              ST.personnels = tempPers;
              ST.causes = tempCauses;
              ST.services = tempSvc;
              ST.groupes = tempGrp;
              
              if(ST.tab === "planning" && !ST.modal && !ST.bModal && !ST.tutoModal) {
                  renderApp();
              }
          }
        }
      });
    }, 60000);
} else {
    renderApp();
}
